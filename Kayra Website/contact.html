<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT KAYRA</title>
  <link rel="stylesheet" href="style.css"> <!-- reuse your existing CSS -->
</head>
<body>
    <script src="form.js" defer></script>
  <main>
    <section class="form-section">
  <h2>Contact</h2>
  <div class="form-divider"></div>

  <form id="form">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder=" " autocomplete="name">
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required>
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder=" " autocomplete="off" required></textarea>
    </div>
    <input type="submit" value="Send">
  </form>
</section>
  </main>

</body>
</html>
