<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ff55eb;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #wrap {
      position: relative;
      width: 80%;
      max-width: 350px;
    }
    #wrap img {
      width: 100%;
    }
    #log {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 13px;
      padding: 10px;
      border-radius: 8px;
      max-height: 90vh;
      overflow-y: auto;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <img src="WRAPPING.png" alt="bouquet">
  </div>
  <div id="log">Click to get coordinates...<br></div>

  <script>
    let count = 0;
    document.addEventListener('click', function(e) {
      const wrap = document.getElementById('wrap');
      const rect = wrap.getBoundingClientRect();
      const wrapCenterX = rect.left + rect.width / 2;
      const wrapCenterY = rect.top + rect.height * 0.38;

      const dx = Math.round(e.clientX - wrapCenterX);
      const dy = Math.round(e.clientY - wrapCenterY);

      count++;
      const line = `{ dx: ${dx}, dy: ${dy}, rot: 0, s: 115, img: 'ROSE.png' },`;
      document.getElementById('log').innerHTML += `<b>${count}.</b> ${line}<br>`;
      console.log(line);
    });
  </script>
</body>
</html>
